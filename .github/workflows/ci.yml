name: CI

# Quality gate only — lint, type-check, test, build. Does NOT deploy.
# Deployment is owned solely by deploy.yml (push to master).

on:
  push:
    branches-ignore:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Lint · Types · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + format (Biome)
        run: pnpm lint

      - name: Type-check (astro check)
        run: pnpm exec astro check

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Build
        run: pnpm build
